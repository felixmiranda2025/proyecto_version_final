<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEF ERP · Prueba de Base de Datos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --azul:#0D2B55; --azul-med:#1A4A8A; --azul-claro:#2E6DB4;
  --verde:#0f9e5a; --rojo:#d63031; --naranja:#e17055;
  --bg:#0a0f1e; --panel:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.08); --mono:'JetBrains Mono',monospace;
}

body{
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:#e0e8f0;
  min-height:100vh;
  padding:32px 24px;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(26,74,138,.25) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(13,43,85,.3) 0%, transparent 50%);
}

.container{ max-width:860px; margin:0 auto; }

/* HEADER */
.header{ margin-bottom:36px; }
.logo-row{ display:flex; align-items:center; gap:14px; margin-bottom:8px; }
.logo-box{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,var(--azul-med),var(--azul-claro));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;box-shadow:0 4px 20px rgba(46,109,180,.4);
}
h1{ font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; color:#fff; }
.subtitle{ color:rgba(255,255,255,.45); font-size:.85rem; margin-top:2px; }

/* CONFIG BOX */
.config-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px 28px;
  margin-bottom:24px;
}
.config-box h2{ font-family:'Syne',sans-serif; font-size:.95rem; color:rgba(255,255,255,.7); margin-bottom:16px; letter-spacing:.5px; text-transform:uppercase; }
.config-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:600px){ .config-grid{ grid-template-columns:1fr; } }

.field label{ display:block; font-size:.72rem; color:rgba(255,255,255,.4); margin-bottom:5px; text-transform:uppercase; letter-spacing:.6px; }
.field input{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);border-radius:8px;
  padding:10px 12px;color:#e0e8f0;
  font-family:var(--mono);font-size:.83rem;
  outline:none;transition:border-color .15s;
}
.field input:focus{ border-color:var(--azul-claro); background:rgba(255,255,255,.08); }
.field.full{ grid-column:1/-1; }

/* BUTTONS */
.btn-row{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 22px;border-radius:9px;border:none;
  font-size:.88rem;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.btn-primary{
  background:linear-gradient(135deg,var(--azul-med),var(--azul-claro));
  color:#fff;box-shadow:0 4px 16px rgba(46,109,180,.35);
}
.btn-primary:hover{ transform:translateY(-1px);box-shadow:0 8px 24px rgba(46,109,180,.45); }
.btn-primary:disabled{ opacity:.5;cursor:not-allowed;transform:none; }
.btn-secondary{
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.12);
}
.btn-secondary:hover{ background:rgba(255,255,255,.12); }

/* STATUS CARD */
.status-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:20px;
  transition:border-color .3s;
}
.status-card.ok   { border-color:rgba(15,158,90,.4); }
.status-card.error{ border-color:rgba(214,48,49,.4); }
.status-card.loading{ border-color:rgba(46,109,180,.4); }

.status-header{
  display:flex;align-items:center;gap:14px;
  padding:20px 24px;
}
.status-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;flex-shrink:0;
}
.status-icon.ok    { background:rgba(15,158,90,.15); }
.status-icon.error { background:rgba(214,48,49,.15); }
.status-icon.loading{ background:rgba(46,109,180,.15); animation:pulse .8s ease infinite; }
@keyframes pulse{ 0%,100%{opacity:.7}50%{opacity:1} }

.status-title{ font-family:'Syne',sans-serif; font-size:1.1rem; color:#fff; font-weight:700; }
.status-sub{ font-size:.8rem; color:rgba(255,255,255,.4); margin-top:2px; }
.latency{ margin-left:auto; font-family:var(--mono); font-size:.8rem; }
.latency.ok{ color:var(--verde); }
.latency.slow{ color:var(--naranja); }
.latency.error{ color:var(--rojo); }

/* METRICS GRID */
.metrics-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;padding:0 24px 24px;
}
.metric{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:14px 16px;
}
.metric .val{ font-family:var(--mono);font-size:1rem;font-weight:600;color:#fff;word-break:break-all; }
.metric .lbl{ font-size:.72rem;color:rgba(255,255,255,.4);margin-top:4px;text-transform:uppercase;letter-spacing:.5px; }

/* TABLES LIST */
.tables-box{
  background:var(--panel);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;margin-bottom:20px;
}
.tables-header{
  padding:18px 24px;border-bottom:1px solid var(--border);
  font-family:'Syne',sans-serif;font-size:.9rem;color:rgba(255,255,255,.7);font-weight:700;
  display:flex;align-items:center;gap:8px;
}
.table-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:.85rem;transition:background .1s;
}
.table-row:last-child{ border-bottom:none; }
.table-row:hover{ background:rgba(255,255,255,.03); }
.table-name{ font-family:var(--mono);color:#a8c5f0; }
.table-rows{ font-family:var(--mono);color:rgba(255,255,255,.35);font-size:.78rem; }
.check{ color:var(--verde);margin-right:6px; }

/* LOG */
.log-box{
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:20px 24px;
  font-family:var(--mono);font-size:.78rem;line-height:1.8;
  max-height:220px;overflow-y:auto;
}
.log-box .ts{ color:rgba(255,255,255,.25); }
.log-box .ok { color:var(--verde); }
.log-box .err{ color:var(--rojo); }
.log-box .info{ color:var(--azul-claro); }
.log-box .warn{ color:var(--naranja); }
.log-title{ font-family:'Syne',sans-serif; font-size:.82rem; color:rgba(255,255,255,.4); margin-bottom:10px; text-transform:uppercase; letter-spacing:.6px; }

/* HIDDEN */
.hidden{ display:none; }

/* SPINNER */
.spin{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;display:inline-block;
}
@keyframes spin{ to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-box">⚡</div>
      <div>
        <h1>VEF Automatización</h1>
        <div class="subtitle">ERP Industrial · Prueba de Conexión a Base de Datos</div>
      </div>
    </div>
  </div>

  <!-- CONFIG -->
  <div class="config-box">
    <h2>⚙ Configuración del Servidor</h2>
    <div class="config-grid">
      <div class="field full">
        <label>URL del servidor Node.js</label>
        <input type="text" id="serverUrl" value="http://localhost:3000" placeholder="http://tu-servidor:3000">
      </div>
      <div class="field">
        <label>Host DB (referencia)</label>
        <input type="text" id="dbHost" value="entorno-1.cx6c6s6i0ith.us-east-2.rds.amazonaws.com" readonly>
      </div>
      <div class="field">
        <label>Base de datos</label>
        <input type="text" id="dbName" value="postgres" readonly>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnTest" onclick="testConnection()">
        <span id="btnIcon">🔌</span>
        <span id="btnText">Probar Conexión</span>
      </button>
      <button class="btn btn-secondary" onclick="loadTables()" id="btnTables">
        📋 Ver Tablas
      </button>
      <button class="btn btn-secondary" onclick="autoRefresh()" id="btnAuto">
        🔄 Auto (10s)
      </button>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-card hidden" id="statusCard">
    <div class="status-header">
      <div class="status-icon" id="statusIcon">⏳</div>
      <div>
        <div class="status-title" id="statusTitle">Verificando...</div>
        <div class="status-sub"  id="statusSub"></div>
      </div>
      <div class="latency" id="latency"></div>
    </div>
    <div class="metrics-grid hidden" id="metricsGrid"></div>
  </div>

  <!-- TABLES -->
  <div class="tables-box hidden" id="tablesBox">
    <div class="tables-header">📋 Tablas en la base de datos <span id="tableCount" style="color:rgba(255,255,255,.4);font-size:.8rem;font-family:'JetBrains Mono',monospace;margin-left:auto"></span></div>
    <div id="tablesList"></div>
  </div>

  <!-- LOG -->
  <div>
    <div class="log-title">📟 Log de actividad</div>
    <div class="log-box" id="logBox">
      <span class="info">▶ Sistema listo. Presiona "Probar Conexión" para comenzar.</span>
    </div>
  </div>

</div>

<script>
let autoInterval = null;
let autoActive = false;

function getUrl(){ return document.getElementById('serverUrl').value.replace(/\/$/,''); }

function log(msg, type='info'){
  const box = document.getElementById('logBox');
  const ts = new Date().toLocaleTimeString('es-MX');
  const line = document.createElement('div');
  line.innerHTML = `<span class="ts">[${ts}]</span> <span class="${type}">${msg}</span>`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function setBtnLoading(on){
  const btn = document.getElementById('btnTest');
  document.getElementById('btnIcon').innerHTML = on ? '<span class="spin"></span>' : '🔌';
  document.getElementById('btnText').textContent = on ? 'Conectando...' : 'Probar Conexión';
  btn.disabled = on;
}

async function testConnection(){
  const url = getUrl();
  const card = document.getElementById('statusCard');
  const icon = document.getElementById('statusIcon');
  const title= document.getElementById('statusTitle');
  const sub  = document.getElementById('statusSub');
  const lat  = document.getElementById('latency');
  const grid = document.getElementById('metricsGrid');

  card.className = 'status-card loading';
  icon.className = 'status-icon loading';
  icon.textContent = '⏳';
  title.textContent = 'Conectando a la base de datos...';
  sub.textContent   = url;
  lat.textContent   = '';
  grid.className    = 'metrics-grid hidden';
  card.classList.remove('hidden');

  setBtnLoading(true);
  log(`Intentando conexión → ${url}/api/health`, 'info');

  const t0 = Date.now();
  try {
    const res  = await fetch(`${url}/api/health`, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const ms   = Date.now() - t0;

    if(data.connected){
      card.className = 'status-card ok';
      icon.className = 'status-icon ok';
      icon.textContent = '✅';
      title.textContent = '¡Conexión exitosa a PostgreSQL!';
      sub.textContent = `${data.host} · ${data.database}`;
      lat.className = ms < 200 ? 'latency ok' : 'latency slow';
      lat.textContent = `${ms}ms`;

      // Metrics
      const pg = (data.pg_version || '').split(' ').slice(0,2).join(' ');
      const st = new Date(data.server_time).toLocaleString('es-MX');
      grid.innerHTML = `
        <div class="metric"><div class="val">${data.database}</div><div class="lbl">Base de Datos</div></div>
        <div class="metric"><div class="val">${data.db_user}</div><div class="lbl">Usuario DB</div></div>
        <div class="metric"><div class="val">${data.total_tables}</div><div class="lbl">Tablas Públicas</div></div>
        <div class="metric"><div class="val">${ms}ms</div><div class="lbl">Latencia</div></div>
        <div class="metric" style="grid-column:1/-1"><div class="val" style="font-size:.78rem">${pg}</div><div class="lbl">Versión PostgreSQL</div></div>
        <div class="metric" style="grid-column:1/-1"><div class="val" style="font-size:.78rem">${st}</div><div class="lbl">Hora del Servidor DB</div></div>
      `;
      grid.classList.remove('hidden');

      log(`✅ Conectado OK — BD: ${data.database} | Tablas: ${data.total_tables} | ${ms}ms`, 'ok');
    } else {
      throw new Error(data.error || 'Conexión fallida');
    }
  } catch(err){
    const ms = Date.now() - t0;
    let msg = err.message;
    let hint = '';

    if(err.name === 'TimeoutError' || err.name === 'AbortError'){
      msg = 'Tiempo de espera agotado (8s)';
      hint = 'El servidor no responde. ¿Está corriendo? → node server.js';
    } else if(msg.includes('fetch') || msg.includes('Failed to fetch') || msg.includes('NetworkError')){
      msg = 'No se pudo conectar al servidor Node.js';
      hint = `Verifica que el servidor esté corriendo en ${url}`;
    } else if(msg.includes('ECONNREFUSED')){
      hint = 'Puerto cerrado. Ejecuta: node server.js';
    }

    card.className = 'status-card error';
    icon.className = 'status-icon error';
    icon.textContent = '❌';
    title.textContent = 'Error de conexión';
    sub.textContent = msg + (hint ? ' — ' + hint : '');
    lat.className = 'latency error';
    lat.textContent = `${ms}ms`;

    log(`❌ Error: ${msg}${hint?' | '+hint:''}`, 'err');
  }

  setBtnLoading(false);
}

async function loadTables(){
  const url = getUrl();
  log('Cargando lista de tablas...', 'info');
  try {
    const res  = await fetch(`${url}/api/health/tables`, { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    const box  = document.getElementById('tablesBox');
    const list = document.getElementById('tablesList');
    const cnt  = document.getElementById('tableCount');

    if(data.tables && data.tables.length){
      cnt.textContent = `${data.tables.length} tablas`;
      list.innerHTML = data.tables.map(t => `
        <div class="table-row">
          <span><span class="check">✓</span><span class="table-name">${t.table_name}</span></span>
          <span class="table-rows">~${parseInt(t.row_estimate).toLocaleString()} filas</span>
        </div>`).join('');
      log(`📋 ${data.tables.length} tablas encontradas: ${data.tables.map(t=>t.table_name).join(', ')}`, 'ok');
    } else if(data.error) {
      list.innerHTML = `<div class="table-row" style="color:var(--rojo)">Error: ${data.error}</div>`;
      log(`❌ Error al cargar tablas: ${data.error}`, 'err');
    } else {
      list.innerHTML = `<div class="table-row" style="color:rgba(255,255,255,.4)">Sin tablas en el esquema public (base de datos vacía)</div>`;
      log('⚠ No hay tablas creadas aún', 'warn');
    }
    box.classList.remove('hidden');
  } catch(err) {
    log(`❌ No se pudieron cargar las tablas: ${err.message}`, 'err');
  }
}

function autoRefresh(){
  const btn = document.getElementById('btnAuto');
  if(autoActive){
    clearInterval(autoInterval);
    autoActive = false;
    btn.textContent = '🔄 Auto (10s)';
    btn.style.background = '';
    log('Auto-refresco desactivado', 'warn');
  } else {
    autoActive = true;
    btn.textContent = '⏹ Detener Auto';
    btn.style.background = 'rgba(214,48,49,.2)';
    log('Auto-refresco activado cada 10 segundos', 'info');
    testConnection();
    autoInterval = setInterval(testConnection, 10000);
  }
}

// Test on enter in URL field
document.getElementById('serverUrl').addEventListener('keydown', e => {
  if(e.key === 'Enter') testConnection();
});

// Initial log info
log(`Host configurado: entorno-1.cx6c6s6i0ith.us-east-2.rds.amazonaws.com`, 'info');
log(`Puerto: 5432 | DB: postgres | SSL: activo`, 'info');
</script>
</body>
</html>
