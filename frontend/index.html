<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEF Automatización · ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--azul:#0D2B55;--azul-med:#1A4A8A;--azul-claro:#2E6DB4;}
body{min-height:100vh;background:var(--azul);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;overflow:hidden;position:relative;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;}
.bg-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(46,109,180,.25) 0%,transparent 70%);top:-100px;right:-100px;animation:pulse 6s ease-in-out infinite;}
.bg-glow2{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(26,74,138,.3) 0%,transparent 70%);bottom:-80px;left:-80px;animation:pulse 8s ease-in-out infinite reverse;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
.card{position:relative;z-index:10;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:52px 48px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.4);animation:slideUp .6s cubic-bezier(.16,1,.3,1);}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.logo{text-align:center;margin-bottom:36px;}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--azul-med),var(--azul-claro));border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:16px;box-shadow:0 8px 24px rgba(46,109,180,.4);}
.logo h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:-.5px;}
.logo p{color:rgba(255,255,255,.5);font-size:.85rem;margin-top:4px;}
.field{margin-bottom:20px;}
.field label{display:block;color:rgba(255,255,255,.7);font-size:.8rem;font-weight:500;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
.field input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:13px 16px;color:#fff;font-size:.95rem;font-family:'DM Sans',sans-serif;transition:all .2s;outline:none;}
.field input::placeholder{color:rgba(255,255,255,.3);}
.field input:focus{border-color:var(--azul-claro);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(46,109,180,.2);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--azul-med),var(--azul-claro));border:none;border-radius:10px;padding:14px;color:#fff;font-size:1rem;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px;box-shadow:0 4px 16px rgba(46,109,180,.4);}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(46,109,180,.5);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.4);color:#ff9a9a;border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:16px;display:none;}
.footer-login{text-align:center;margin-top:28px;color:rgba(255,255,255,.35);font-size:.78rem;}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-glow"></div><div class="bg-glow2"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>VEF Automatización</h1>
    <p>Sistema ERP · Gestión Empresarial</p>
  </div>
  <div class="error" id="errMsg"></div>
  <div class="field"><label>Usuario</label><input type="text" id="username" placeholder="nombre de usuario" autocomplete="username"></div>
  <div class="field"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn-login" id="btnLogin" onclick="doLogin()">Iniciar Sesión</button>
  <div class="footer-login">📞 +52 (722) 115-7792 &nbsp;·&nbsp; soporte.ventas@vef-automatizacion.com</div>
</div>
<script>
// Redirect if already logged in
if(localStorage.getItem('vef_token')) window.location.href = '/app';

document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin(){
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Verificando...';
  try {
    const res = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if(data.token){
      localStorage.setItem('vef_token', data.token);
      localStorage.setItem('vef_user', JSON.stringify(data.user));
      window.location.href = '/app';
    } else {
      throw new Error(data.error || 'Credenciales incorrectas');
    }
  } catch(e){
    err.textContent = '⚠ ' + e.message;
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Iniciar Sesión';
  }
}
</script>
</body>
</html>
